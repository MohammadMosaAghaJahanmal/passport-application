		<script>
			let serverPath = (path) => {
				return (new URL(`http://localhost:8080/v1${path}`).href)
				// return (new URL(`http://easyform.jahanmal.xyz/v1${path}`).href)
				
			}; 
			const DB_NAME = "PAS_INFO";
			let database = localStorage.getItem("PAS_INFO");
			try {
				if(database)
					database = JSON.parse(database);
				if(!database)
					database = [];
			} catch (error) {
				database = [];
			}

			function fineOne(barCode) {
				return database.find(perApplicant => perApplicant.barCode === barCode);
			}

			function deleteOne(barCode) {
				const cloneDB = [...database];
				const findIndex = cloneDB.findIndex((perApplicant) => perApplicant.barCode === barCode);
				cloneDB.splice(findIndex, 1);
				saveDatabase(cloneDB);
			}

			function createOne(data) {
				const cloneDB = [...database];
				const isExists = cloneDB.find(per => per.barCode === data.barCode);
				if(isExists)
				{
					alert("دا بارکوډ دمخه لا شتون لري")
					return false; 
				}
				cloneDB.push(data);
				saveDatabase(cloneDB);
				return true
			}

			function insertBulky(data = []) {
				const cloneDB = [...database];
				data.forEach(perNewApp => {
					let findNDX = cloneDB.findIndex(perOldApp => (perOldApp.barCode == perNewApp.barCode && perOldApp.date == perNewApp.date))
					if(findNDX < 0)
						cloneDB.push(perNewApp);
				})
				saveDatabase(cloneDB);
			}

			function updateOne(oldBar, data) {
				const cloneDB = [...database];
				cloneDB[cloneDB.findIndex(per => per.barCode === oldBar)] = data;
				saveDatabase(cloneDB);
			}

			function saveDatabase(newData) {
				localStorage.setItem(DB_NAME, JSON.stringify(newData));
				database = newData;
			}

			function createELM(tagName) {
				return document.createElement(tagName);
			}
			const readCSV = (content = "") =>
			{
				const lines = content.split('\n');
				const headers = lines[0].split(',');
				if(headers.length !== 5)
					return alert("Failure Incorrect Formatted File!")
				const objects = [];

				for (let i = 1; i < lines.length; i++) {
					const values = lines[i].split(',');
					if(values.length !== 5)
						continue;
					const obj = {};
					for (let j = 0; j < headers.length; j++) {
						if(headers[j]?.trim() === "checked")
						{
							obj[headers[j].trim()] = Number.parseInt(values[j])
							continue;
						}
						obj[headers[j]?.trim()] = values[j]?.trim();
					}
					objects.push(obj);
				}
				return objects;
			}

		</script>

			async function onbackup(data) {
					let newData = data;
					if (!data) newData = database;
					const textarea = document.createElement('textarea');
					let createBackupData = newData.map(perApp => data ?
							`${perApp.barCode},${perApp.date},${perApp.name}`
							:
							`${afghanistanProvinces.find(per => per.province.toLowerCase() === perApp.province?.toLowerCase())?.province},${perApp.barCode},${perApp.date},${perApp?.checked ? 1 : 0},${perApp.name}`
					);
					textarea.value = createBackupData.join("\n");
					textarea.style.height = "0";
					textarea.style.overflow = "hidden";
					document.body.focus();
					document.body.appendChild(textarea);
					textarea.select();
					try {
						// alert('Backup data copied to clipboard successfully!');
							await navigator.clipboard.writeText(textarea.value);
					} catch (err) {
							alert('Failed to copy backup data: ' + err);
					} finally {
							document.body.removeChild(textarea);
					}
			}

								"name": name,
								"__VIEWSTATEGENERATOR": "768A9483",
								"__EVENTVALIDATION": getKEYS?.__EVENTVALIDATION,
								"__SCROLLPOSITIONX": "0",
								"__SCROLLPOSITIONY": "0",
								"__EVENTARGUMENT": "",
								"__EVENTTARGET": "",
								"__VIEWSTATE": getKEYS?.__VIEWSTATE,
								"uxBirthDate": date,
								"uxSearch": "جستجو",
								"uxCode": barCode,
								"axLocationID": afghanistanProvinces.find((per) => per.province.toLowerCase() == province?.toLowerCase())?.id,
							})
						});
						if(response.status === 500)
						return alert("VALIDATE FORM");
					
					const objData = await response.json();
					if(objData.status === "success" && type == 'barcode')
					{
						checkHandler({checked: true}, barCode)
						if(!isDirect)
							findParentRow(elm).querySelector("input[type=checkbox]").checked = true;
						console.log(objData, barCode, province, name)
					}
					else if(objData.status === "success" && type != 'barcode')
					{
								let findExist = backupData.findIndex(perAp => perAp?.barCode == objData?.data?.barCode)
								if(findExist >= 0)
									return
								backupData.push(objData.data)
								console.log(backupData.length)
								await onbackup(backupData)
					}
					else
						console.log(objData, barCode, province, name)
				} catch (error) {
					console.log(error)
				}
					
			}
			async function changeAll()
			{
				const isConfirm = confirm("Are u Sure To Proceed!");
				if(!isConfirm)
					return
				database.forEach((per, index) => {
					changeHandler(
						per.barCode, 
						per.date, 
						per.province, 
						per.name, 
						document.getElementById(per.barCode),
						'barcode',
						true
					)
					.then(res => res)
					.catch(err => console.log(err))
					.finally(() => console.log(index + 1))
				})
			}
				
			async function onclipboard(elm) {
				database.forEach((per) => {
					changeHandler(per.barCode, per.date, per.province, per.name, elm, 'openbarcode', true)
					.then(res => console.log(res))
					.catch(err => console.log(err))
				})
			}
			let timeoutId = 0;
			async function submitAllHandler(elm)
			{
				clearTimeout(timeoutId)
				let provinces = await getProvinces(elm, 'tryAndSubmit')
				console.log(provinces)
				if(provinces.length <= 0)
				{
					timeoutId = setTimeout(async() => {
						 await submitAllHandler(elm)
					}, 10000);
					return
				}
				console.log("PROVICES FOUND AND LOADED");

				const audioElm = `<audio src="alert.mp3" autoplay loop></audio>`;
				document.body.insertAdjacentHTML('afterbegin', audioElm)
				let isKeysLoaded = await loadKeys(elm, 'notShow');
				if(!isKeysLoaded)
					await loadKeys(elm, 'notShow');
				console.log("SECRETS LOADED");

				database.forEach(perBarcode => {
					let findAvailible = provinces.findIndex(pProv => pProv.province == perBarcode.province)
					console.log(findAvailible);
					if(findAvailible >= 0)
						changeHandler(perBarcode.barCode, perBarcode.date, perBarcode.province, perBarcode.name, elm, 'barcode', true)
						.then(res => console.log(res))
						.catch(err => console.log(err))
				})
				
			}

			async function getProvinces(elm, type) {
				try {
					let response = await fetch(await serverPath("/easyform/provinces"), {
						method: "POST",
						headers: {
							"Authorization": `bearer ${token}`
						},
					});
					const objData = await response.json();
					if(objData.status === 'success')
					{
						if(type === 'get')
							return alert(objData.data.map(prov => prov.name).join("\n"))
						
						let tryAndSubmit = [];
						
						objData.data.forEach(per => {
							let value = per.value;
							let searchKeys = [
							// { province: "Badghis", id: 32 },
							// { province: "Faryab", id: 29 },
							// { province: "Ghor", id: 21 },
							// { province: "Kandahar", id: 31 },
							{ province: "Sar-e Pol", id: 20 },
							];
							let getIndex = searchKeys.findIndex((perValue) => perValue.id == value);
							if(getIndex >= 0)
								return tryAndSubmit.push(searchKeys[getIndex]);
							return false
						})
						return  tryAndSubmit;

					}
					if(objData.status === 'failure')
						alert("Info " +  objData.message)
				} catch (error) {
						console.log(error)
						alert("Error Please try again!" + error.message)
				}
		}

		</script>
