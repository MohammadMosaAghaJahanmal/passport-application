<html>
	<head>
		<meta charset="utf-8">
		<meta http-equiv="X-UA-Compatible" content="IE=edge">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Passport Form</title>
		<style>
			*{
				box-sizing: border-box;
				text-align: center;
			}
			body{
				background-color: #eee;
			}
			input:not([type=submit]){
				font-size: 16px;
				font-weight: bold;
				text-align: right;
			}
			label{
				display: inline-block;
				width: 100%;
			}
			button, .submit-btn {
				font-size: 16px;
				display: inline-block;
				padding: 5px 5px;
				border-radius: 3px;
				border: 1px solid #c7bebe;
				transition: 200ms;
				cursor: pointer;
			}
			button:hover, .submit-btn:hover {
					background-color: #dddddd;
			}
			button:active, .submit-btn:active{
				background-color: rgb(99, 79, 79);
				color: white;
			}
			button:focus, .submit-btn:focus{
				background-color: rgb(99, 79, 79);
				color: white;
			}
			table {
					border-collapse: collapse;
					width: 100%;
			}

			td button, .submit-btn{
				padding: 5px 15px;
			}
			td, th {
					border: 1px solid #dddddd;
					text-align: center;
					transition: 200ms;
			}
			tr:nth-child(even) {
					background-color: rgba(104, 90, 90, 0.1);
			}
			td:hover {
					background-color: #dddddd;
			}
			th {
					background-color: #4CAF50;
					color: white;
					padding: 5px;
			}
			.form{
				background-color: #eee;
				max-width: 400px;
				margin: 10px auto;
				padding: 10px;
				display: grid;
			}
			.form button
			{
				font-weight: bold;
			}
			.submit{
				background-color: dodgerblue;
				color: white;
			}
			.info{
				background-color: burlywood;
				color: black;
			}
			.danger{
				background-color: crimson;
				color: white;
			}
			.submit:hover{
				background-color: rgb(6, 94, 182);
			}
			.info:hover{
				background-color: rgb(243, 218, 186);
			}
			.danger:hover{
				background-color: rgb(255, 68, 105);
			}
			.btn-group{
				display: flex;
				justify-content: center;
			}
			input{
				width: 100%;
				padding: 5px;
			}
			.form-group{
				margin: 5px 0;
			}
			.export-import{
				display: grid;
				margin: 30px auto;
				max-width: 400px;
				row-gap: 20px;
			}
		</style>
		<script>
			const DB_NAME = "PAS_INFO";
			let database = localStorage.getItem("PAS_INFO");
			try {
				if(database)
					database = JSON.parse(database);
				if(!database)
					database = [];
			} catch (error) {
				database = [];
			}

			function fineOne(barCode) {
				return database.find(perApplicant => perApplicant.barCode === barCode);
			}

			function deleteOne(barCode) {
				const cloneDB = [...database];
				const findIndex = cloneDB.findIndex((perApplicant) => perApplicant.barCode === barCode);
				cloneDB.splice(findIndex, 1);
				saveDatabase(cloneDB);
			}

			function createOne(data) {
				const cloneDB = [...database];
				const isExists = cloneDB.find(per => per.barCode === data.barCode);
				if(isExists)
				{
					alert("دا بارکوډ دمخه لا شتون لري")
					return false; 
				}
				cloneDB.push(data);
				saveDatabase(cloneDB);
				return true
			}

			function insertBulky(data) {
				const cloneDB = [...database, ...data];
				saveDatabase(cloneDB);
			}

			function updateOne(oldBar, data) {
				const cloneDB = [...database];
				cloneDB[cloneDB.findIndex(per => per.barCode === oldBar)] = data;
				saveDatabase(cloneDB);
			}

			function saveDatabase(newData) {
				localStorage.setItem(DB_NAME, JSON.stringify(newData));
				database = newData;
			}

			function createELM(tagName) {
				return document.createElement(tagName);
			}
		</script>
	</head>

	<body>
		<div class="form">
			<button onclick="loadKeys(this)" class="submit">
				فورمه باوری کړی
			</button>
			<br>
			<form method="post" action="https://passport.moi.gov.af/BarcodeSearch/" id="form2" target="_blank">
				<div class="aspNetHidden">
					<input type="hidden" name="__VIEWSTATE" id="__VIEWSTATE" value="">
				</div>
				<div class="aspNetHidden">
					<input type="hidden" name="__VIEWSTATEGENERATOR" id="__VIEWSTATEGENERATOR" value="768A9483">
					<input type="hidden" name="__EVENTVALIDATION" id="__EVENTVALIDATION" value="">
				</div>

				<div class="form-group">
						<label id="Label70" class="aspLabel" for="uxCode">بارکوډ</label>
					<input name="uxCode" type="text" maxlength="50" id="uxCode" class="form-control" rule="{fn:'required'}" required="" placeholder="کوډ داخل کړی">
				</div>

				<div class="form-group">
						<label id="Label3" class="aspLabel" for="uxBirthDate">دپیدایښت نیټه په شمسی</label>
					<input name="uxBirthDate" type="text" maxlength="50" id="uxBirthDate" class="form-control date hasCalendarsPicker" rule="{fn:'required'}" required="" placeholder="دپیدایښت نیټه په شمسی">
				</div>
					<input type="submit" name="uxSearch" value="لټون" id="uxSearch" class="submit-btn info">

			</form>
			<div class="form-group">
				<label id="Label70" class="aspLabel" for="uxName">نوم</label>
				<input type="text" value="" id="uxName" placeholder="نوم">
			</div>
			<button onclick="saveFormData(this)" class="submit">فورمه سبت کړی</button>
		</div>

		<div style="max-width: 1366px;margin: 0 auto;">
			<table>
				<thead>
					<tr>
						<th>کړنې</th>
						<th>نوم</th>
						<th>تغیر</th>
						<th>#</th>
					</tr>
				</thead>
				<tbody></tbody>
			</table>
			<div class="export-import">
				<button onclick="onbackup()" class="submit">
					Export Backup
				</button>
				<textarea placeholder="Data" rows="10" style="resize: vertical;"></textarea>
				<button onclick="importBackup()" class="info">
					Import Backup
				</button>
			</div>
		</div>
		<script>
			console.clear();
			const form2 = document.getElementById("form2");
			const uxCode = document.getElementById("uxCode");
			const uxBirthDate = document.getElementById("uxBirthDate");
			const uxSearch = document.getElementById("uxSearch");
			const __VIEWSTATE = document.getElementById("__VIEWSTATE");
			const __EVENTVALIDATION = document.getElementById("__EVENTVALIDATION");
			const tbody = document.querySelector("table tbody");
			const nameInput = document.getElementById("uxName");
			function submitHandler(code, date) {
				uxCode.value = code;
				uxBirthDate.value = date;
				uxSearch.click()
				uxCode.value = "";
				uxBirthDate.value = "";
			}

			async function loadKeys(elm) {
				try {
					const response = await fetch('https://passport.moi.gov.af/BarcodeSearch/');
					const text = await response.text();
					const HTML_ELM = createELM("html");
					HTML_ELM.insertAdjacentHTML("afterbegin", text);
					const newViewState = HTML_ELM?.querySelector("#__VIEWSTATE");
					const newEventValidation = HTML_ELM?.querySelector("#__EVENTVALIDATION");
					if(!newViewState || !newEventValidation)
						return alert("تېروتنه. د فورمی باوری کولو تڼی بیا کښیکاږی");

					__VIEWSTATE.value = newViewState.value;
					__EVENTVALIDATION.value = newEventValidation.value;
					alert("په بریالیتوب سره باوری شوه");
					const passport = {
						__VIEWSTATE: newViewState.value,
						__EVENTVALIDATION: newEventValidation.value
					};
					window.localStorage.setItem("passport", JSON.stringify(passport));
				} catch (error) {
					alert("تېروتنه بیاکوښښ وکی " + error.message);
				}
			}

			document.onreadystatechange = (e) => {
				if(document.readyState === "complete")
				{
					try {
						let getKEYS = window.localStorage.getItem("passport");
						if(getKEYS)
						{
							getKEYS = JSON.parse(getKEYS);
							__VIEWSTATE.value = getKEYS.__VIEWSTATE
							__EVENTVALIDATION.value = getKEYS.__EVENTVALIDATION
						}
					} catch (error) {
						console.log(error.message)
					}
					if(tbody)
							loadDataToTable(tbody)
				}
			}

			function loadDataToTable(tbody) {
				tbody.innerHTML = "";
				database.forEach((applicant, index) => {
					tbody.insertAdjacentHTML("beforeend", `
						<tr>
							<td class="action">
								<div class="btn-group">
									<button class="danger" onclick="deleteHandler(this, '${applicant.barCode}')">ړنګول</button>
									<button class="info" onclick="editHandler(this, '${applicant.barCode}')">سمون</button>
									<button class="Submit" onclick="submitHandler('${applicant.barCode}', '${applicant.date}')">سپارل</button>
								</div>
							</td>
							<td class="app-name">${applicant.name}</td>
							<td class="checked">
								<input type="checkbox" ${applicant.checked ? 'checked' : ""} onchange="checkHandler(this, '${applicant.barCode}')" >
							</td>
							<td class="number">${(index + 1)}</td>
						</tr>
					`)
				});
			}

			function saveFormData(elm) {
				const barCodeText = uxCode?.value?.trim()
				const barCodeDate = uxBirthDate?.value?.trim();
				const barCodeName = nameInput?.value?.trim();
				if(validateText(barCodeName, "د نامه") || validateText(barCodeText, "د بارکوډ") || validateText(barCodeDate, "د نیټی"))
					return;

				let isUpdated = createOne({
					name: barCodeName,
					barCode: barCodeText,
					date: barCodeDate,
					checked: false,
				});
				if(!isUpdated)
					return
				const rowToInsert = changeRowData(null, {
					name: barCodeName,
					barCode: barCodeText,
					date: barCodeDate,
					checked: false,
					number: (database.length + 1)
				});
				console.log(rowToInsert);
				tbody.insertAdjacentElement('beforeend', rowToInsert)
				uxCode.value = ""
				uxBirthDate.value = ""
				nameInput.value = ""
			}

			function validateText(text, name) {
				let value = text?.trim()?.length <= 0;
				if(value)
					alert(name + " داخلیدو ته اړتیا ده");
				return value;
			}

			function deleteHandler(elm, BAR_CODE) {
				console.log(elm)
				console.log(BAR_CODE)
				const isConfirm = confirm("ایا تاسو ډاډه یاست چې دا غوښتنلیک حذف کړئ");
				if(isConfirm)
				{
					deleteOne(BAR_CODE);
					findParentRow(elm)?.remove();
				}
			}

			function editHandler(elm, BAR_CODE) {
				const getApplicant = fineOne(BAR_CODE);
				const barCodeName = prompt("نوی نوم", getApplicant.name);
				const barCodeText = prompt("نوی بارکوډ", getApplicant.barCode);
				const barCodeDate = prompt("نوی نیټه", getApplicant.date);;
				if(validateText(barCodeName, "د نامه") || validateText(barCodeText, "د بارکوډ") || validateText(barCodeDate, "د نیټی"))
					return;
				const newData = {
					name: barCodeName?.trim() || getApplicant.name,
					barCode: barCodeText?.trim() || getApplicant.barCode,
					date: barCodeDate?.trim() || getApplicant.date,
					checked: getApplicant.checked
				}
				updateOne(BAR_CODE, newData);
				changeRowData(elm, newData);
			}

			function checkHandler(elm, BAR_CODE) {
				const getApplicant = fineOne(BAR_CODE);
				updateOne(BAR_CODE, {
					...getApplicant,
					checked: elm.checked
				});
			}

			function onbackup() {
				navigator.clipboard.writeText(JSON.stringify(database)).then(res => {})
			}

			function importBackup() {
				const textarea = document.querySelector("textarea");
				const dataText = textarea.value;
				if(dataText.length <= 0)
					return alert("د معلوماتو داخلولو ته اړتیا ده");
				try {
					const objData = JSON.parse(dataText);
					if(!(Array.isArray(objData)))
					{
						alert("مهرباني وکړئ د معلوماتو سم ډول دننه کړئ");
					}
					else
					{
						insertBulky(objData)
						loadDataToTable(tbody)
						alert("په بریالیتوب سره اضافه شوه")
					}
				} catch (error) {
					alert("مهرباني وکړئ د معلوماتو سم ډول دننه کړئ!")
				}
				textarea.value = "";
			}


			function changeRowData(elm, data) {
				let TR = document.createElement("tr");
				let NumberField = document.createElement("td");
				NumberField.innerHTML = data?.number;
				NumberField.setAttribute("class", 'number');
				if(elm)
				{
					TR = findParentRow(elm);
					NumberField = TR.querySelector(".number")?.cloneNode(true);
				}
				TR.innerHTML = "";
				TR.insertAdjacentHTML('beforeend', `
				<td class="action">
					<div class="btn-group">
						<button class="danger" onclick="deleteHandler(this, '${data.barCode}')">ړنګول</button>
						<button class="info" onclick="editHandler(this, '${data.barCode}')">سمون</button>
						<button class="Submit" onclick="submitHandler('${data.barCode}', '${data.date}')">سپارل</button>
					</div>
				</td>
				<td class="app-name">${data.name}</td>
				<td class="checked">
					<input type="checkbox" ${data.checked ? 'checked' : ""} onchange="checkHandler(this, '${data.barCode}')" >
				</td>
				`
				);
				TR.insertAdjacentElement("beforeend", NumberField);
				return TR
}

			function findParentRow(element) {
				while (element && element.tagName !== 'TR') 
						element = element.parentNode;
				return element;
			}
		</script>
	</body>
</html>
