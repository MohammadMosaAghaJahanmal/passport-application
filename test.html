<body>
  <form method="post" action="http://passport.moi.gov.af/BarcodeSearch/" id="form2" target="_blank">

    </div>

    <script type="text/javascript">
      var theForm = document.forms['form2'];
      if (!theForm) {
          theForm = document.form2;
      }
      function __doPostBack(eventTarget, eventArgument) {
          if (!theForm.onsubmit || (theForm.onsubmit() != false)) {
              theForm.__EVENTTARGET.value = eventTarget;
              theForm.__EVENTARGUMENT.value = eventArgument;
              theForm.submit();
          }
      }
    </script>

    <div class="aspNetHidden">
      <input type="hidden" name="__VIEWSTATEGENERATOR" id="__VIEWSTATEGENERATOR" value="768A9483">

      <input type="hidden" name="__EVENTARGUMENT" id="__EVENTARGUMENT" value="">
      <input type="hidden" name="__EVENTVALIDATION" id="__EVENTVALIDATION" value="HHhFP/Rz1fW/FvCGFe01bDX6SgWdcTG2VHrLZ2g6og06BCsuoJLjy3YZYE1Zf+bytV4mmAZ+WdW1LkvVQlty986+AhqRGnATMYXTiwYqc5jIZLJs9CINCQsUWMBoTQnzPTYS4ZL0oMVowJKt2uDAPCZvU5YnWtHZnJtyCWlDj38=">

    <div class="form-group">

    <div class="form-group">

      <div class="labelReq">

    <div class="form-btn">

  <button class="submit">SUBMIT</button>
  <script>
    const submit = document.querySelector(".submit")
    
    submit.onclick = () =>
